<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kim Collection — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Jost:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --blush: #FBF3EF;
    --card: #FFFFFF;
    --rose-gold: #B76E79;
    --rose-deep: #8C5A63;
    --gold: #C9A66B;
    --ink: #3A2C2E;
    --muted: #948581;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--blush);
    color: var(--ink);
    font-family: 'Jost', sans-serif;
  }
  header {
    padding: 32px 24px 20px;
    text-align: center;
    border-bottom: 1px solid rgba(201,166,107,0.25);
  }
  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
    font-size: 26px;
    margin: 0 0 4px;
    color: var(--rose-deep);
  }
  .sub { color: var(--muted); font-size: 14px; }
  main { max-width: 900px; margin: 0 auto; padding: 32px 24px 80px; }
  h2 { font-family: 'Cormorant Garamond', serif; font-size: 20px; color: var(--ink); margin: 32px 0 16px; }
  .item {
    display: flex;
    gap: 18px;
    background: var(--card);
    border: 1px solid rgba(201,166,107,0.2);
    border-radius: 4px;
    padding: 16px;
    margin-bottom: 16px;
  }
  .item img { width: 110px; height: 110px; object-fit: cover; border-radius: 3px; flex-shrink: 0; }
  .item-fields { flex: 1; display: flex; flex-direction: column; gap: 8px; }
  label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
  input, textarea {
    font-family: 'Jost', sans-serif;
    font-size: 14px;
    padding: 8px 10px;
    border: 1px solid rgba(140,90,99,0.25);
    border-radius: 3px;
    width: 100%;
  }
  textarea { resize: vertical; min-height: 44px; }
  .commission-note { font-size: 12px; color: var(--muted); }
  .actions { display: flex; gap: 10px; margin-top: 4px; }
  button {
    font-family: 'Jost', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 8px 16px;
    border-radius: 3px;
    border: none;
    cursor: pointer;
  }
  .approve { background: var(--rose-gold); color: white; }
  .approve:hover { background: var(--rose-deep); }
  .reject { background: transparent; color: var(--muted); border: 1px solid rgba(148,133,131,0.4); }
  .reject:hover { border-color: var(--muted); }
  .empty { color: var(--muted); font-style: italic; padding: 20px 0; }
</style>
</head>
<body>

<header>
  <h1>Kim Collection — Review Queue</h1>
  <div class="sub">Approve items before clients see them. Nothing here is public until approved.</div>
</header>

<main>
  <h2>Awaiting approval</h2>
  <div id="pending"></div>
</main>

<script>
  async function loadPending() {
    const res = await fetch('/api/pending');
    const items = await res.json();
    const container = document.getElementById('pending');

    if (!items.length) {
      container.innerHTML = '<div class="empty">Nothing waiting. Forward a supplier post to your bot to add one.</div>';
      return;
    }

    container.innerHTML = items.map(item => `
      <div class="item" data-id="${item.id}">
        <img src="/uploads/${item.imageFile}" alt="">
        <div class="item-fields">
          <div>
            <label>Description</label>
            <textarea class="desc-input">${item.description || ''}</textarea>
          </div>
          <div>
            <label>Price</label>
            <input class="price-input" type="number" step="0.01" value="${item.price !== null ? item.price : ''}">
          </div>
          <div class="commission-note">Your cut (${(item.commissionRate * 100).toFixed(0)}%): ${item.commissionAmount !== null ? item.commissionAmount.toFixed(2) : '—'}</div>
          <div class="actions">
            <button class="approve">Approve &amp; publish</button>
            <button class="reject">Discard</button>
          </div>
        </div>
      </div>
    `).join('');

    container.querySelectorAll('.item').forEach(el => {
      const id = el.dataset.id;
      el.querySelector('.approve').addEventListener('click', async () => {
        const price = el.querySelector('.price-input').value;
        const description = el.querySelector('.desc-input').value;
        await fetch(`/api/approve/${id}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ price, description }),
        });
        loadPending();
      });
      el.querySelector('.reject').addEventListener('click', async () => {
        await fetch(`/api/reject/${id}`, { method: 'POST' });
        loadPending();
      });
    });
  }

  loadPending();
</script>

</body>
</html>
